version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: bandboost-db
    environment:
      POSTGRES_USER: bandboost_user
      POSTGRES_PASSWORD: bandboost_password
      POSTGRES_DB: bandboost_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bandboost-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
