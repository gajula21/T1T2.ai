name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bandboost_user
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: bandboost_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Lint with flake8
        working-directory: backend
        run: |
          flake8 . --count --max-line-length=120 \
            --exclude=migrations,__pycache__,*.pyc \
            --ignore=E501,W503

      - name: Check formatting with Black
        working-directory: backend
        run: black --check --diff .

      - name: Run Django system checks
        working-directory: backend
        env:
          DEBUG: "True"
          SECRET_KEY: "ci-test-secret-key"
          DATABASE_URL: postgres://bandboost_user:testpassword@localhost:5432/bandboost_test
          REDIS_URL: redis://localhost:6379/0
          ALLOWED_HOSTS: "localhost"
          GEMINI_API_KEYS: "fake-key-for-ci"
          HF_API_TOKEN: "fake-hf-token"
          SUPABASE_URL: "https://fake.supabase.co"
          SUPABASE_ANON_KEY: "fake"
          SUPABASE_JWT_SECRET: "fake-jwt-secret"
        run: python manage.py check

      - name: Run migrations
        working-directory: backend
        env:
          DEBUG: "True"
          SECRET_KEY: "ci-test-secret-key"
          DATABASE_URL: postgres://bandboost_user:testpassword@localhost:5432/bandboost_test
          REDIS_URL: redis://localhost:6379/0
          ALLOWED_HOSTS: "localhost"
          GEMINI_API_KEYS: "fake-key-for-ci"
          SUPABASE_JWT_SECRET: "fake-jwt-secret"
        run: python manage.py migrate

      - name: Run tests
        working-directory: backend
        env:
          DEBUG: "True"
          SECRET_KEY: "ci-test-secret-key"
          DATABASE_URL: postgres://bandboost_user:testpassword@localhost:5432/bandboost_test
          REDIS_URL: redis://localhost:6379/0
          ALLOWED_HOSTS: "localhost"
          GEMINI_API_KEYS: "fake-key-for-ci"
          HF_API_TOKEN: "fake-hf-token"
          SUPABASE_URL: "https://fake.supabase.co"
          SUPABASE_ANON_KEY: "fake"
          SUPABASE_JWT_SECRET: "fake-jwt-secret"
        run: pytest --tb=short -q
